<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details | AutoValue AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #060818;
            color: #f8f9fa;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .page-shell {
            padding: 3rem 1rem;
        }
        .card {
            border: none;
            border-radius: 1.75rem;
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.35);
        }
        .form-control,
        .form-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #edf2f7;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 0.2rem rgba(124, 58, 237, 0.22);
            background: rgba(255,255,255,0.1);
        }
        .btn-primary {
            border-radius: 999px;
            padding: 0.95rem 1.7rem;
            font-weight: 600;
            box-shadow: 0 16px 35px rgba(124, 58, 237, 0.24);
        }
        .btn-secondary {
            border-radius: 999px;
            padding: 0.95rem 1.7rem;
            border-color: rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.06);
            color: #f8f9fa;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
        }
        .badge-status {
            background: rgba(124, 58, 237, 0.18);
            color: #d8cff5;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 999px;
            font-size: 0.75rem;
            padding: 0.55rem 0.95rem;
        }
    </style>
</head>
<body>
    <div class="page-shell d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-10">
                    <div class="card p-5">
                        <div class="row gy-4">
                            <div class="col-lg-6">
                                <span class="badge-status">AutoValue AI</span>
                                <h1 class="display-6 fw-bold mt-4">Tell us about your car</h1>
                                <p class="text-muted">Enter the details below so our AI can estimate a premium resale price for your vehicle.</p>
                                {% if car_type %}
                                <div class="alert alert-info mt-4" role="alert">
                                    Selected car type: <strong>{{ car_type | title }}</strong>
                                </div>
                                {% endif %}
                                {% if prediction is defined %}
                                <div class="alert alert-success mt-4" role="alert">
                                    <h4 class="alert-heading">Estimated Price</h4>
                                    <p class="mb-0 display-6">₹ {{ prediction }} Lakhs</p>
                                </div>
                                {% endif %}
                            </div>
                            <div class="col-lg-6">
                                <form action="/predict" method="post" class="row g-3">
                                    <div class="col-12">
                                        <label class="form-label">Kilometers Driven</label>
                                        <input type="number" class="form-control" name="kms_driven" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Car Age (years)</label>
                                        <input type="number" class="form-control" name="car_age" required>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Fuel Type</label>
                                        <select class="form-select" name="fuel" required>
                                            <option value="Petrol">Petrol</option>
                                            <option value="Diesel">Diesel</option>
                                            <option value="CNG">CNG</option>
                                            <option value="LPG">LPG</option>
                                            <option value="Electric">Electric</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Seller Type</label>
                                        <select class="form-select" name="seller_type" required>
                                            <option value="Dealer">Dealer</option>
                                            <option value="Individual">Individual</option>
                                            <option value="Trustmark Dealer">Trustmark Dealer</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Transmission</label>
                                        <select class="form-select" name="transmission" required>
                                            <option value="Manual">Manual</option>
                                            <option value="Automatic">Automatic</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Owner</label>
                                        <select class="form-select" name="owner" required>
                                            <option value="First Owner">First Owner</option>
                                            <option value="Second Owner">Second Owner</option>
                                            <option value="Third Owner">Third Owner</option>
                                            <option value="Fourth & Above Owner">Fourth & Above Owner</option>
                                            <option value="Test Drive Car">Test Drive Car</option>
                                        </select>
                                    </div>
                                    <div class="col-12 d-flex gap-2 flex-wrap">
                                        <button type="submit" class="btn btn-primary">Get Price Estimate</button>
                                        <a href="/" class="btn btn-secondary">Back to Home</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
