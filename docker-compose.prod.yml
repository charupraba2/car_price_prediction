version: '3.8'

services:
  car-price-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_price_prediction_app
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./model:/app/model
      - ./datasets:/app/datasets
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: car_price_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - car-price-app
    restart: always
